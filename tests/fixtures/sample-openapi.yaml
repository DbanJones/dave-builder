openapi: 3.0.0
info:
  title: Sample API
  version: 1.2.3
paths:
  /users:
    get:
      summary: List users
      responses:
        "200":
          description: A list of users
    post:
      summary: Create a user
      responses:
        "201":
          description: Created
  /users/{id}:
    get:
      summary: Get a user
      responses:
        "200":
          description: A user
    delete:
      summary: Delete a user
      responses:
        "204":
          description: Gone
